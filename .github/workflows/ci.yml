name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare DVC remote directory
        run: |
          mkdir -p mlops-dvc-remote

      - name: Pull data with DVC
        run: |
          dvc pull

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  train:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare DVC remote directory
        run: |
          mkdir -p mlops-dvc-remote

      - name: Pull data with DVC
        run: |
          dvc pull

      - name: Run training
        run: |
          python src/train.py




          

          