data:
  raw_path: "data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv"
  target: "Attrition"
  test_size: 0.2
  random_state: 42

model:
  type: "random_forest"
  n_estimators: 100
  max_depth: 6
  random_state: 42

mlflow:
  experiment_name: "ibm_attrition_experiments"

thresholds:
  accuracy_min: 0.75
  f1_min: 0.65

drift:
  dataset_drift_share_threshold: 0.4


  